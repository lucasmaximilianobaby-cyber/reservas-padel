<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservas Pádel</title>
<style>
body { font-family: Arial; background: url('Fondo 1.png') no-repeat center fixed; background-size: cover; margin: 0; padding: 20px; text-align: center; }
.pantalla { display: none; }
.activa { display: block; }
body.fondo2 { background: url('Fondo 2.png') no-repeat center fixed; background-size: cover; }
button { padding: 12px 24px; margin: 8px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; }
.btn-principal { background: #4CAF50; color: white; }
.btn-cancelar { background: #f44336; color: white; }
.btn-atras { background: #666; color: white; }
input, select { padding: 10px; margin: 8px; font-size: 16px; }
.hora-btn { background: #2196F3; color: white; }
.hora-btn.ocupado { background: #999; cursor: not-allowed; }
.hora-btn.seleccionado { background: #FF9800; }
#estado { font-size: 18px; margin: 15px; font-weight: bold; }
</style>
</head>
<body>

<!-- PANTALLA INICIO -->
<div id="inicio" class="pantalla activa">
  <h1>🎾 Reservas Pádel</h1>
  <button class="btn-principal" onclick="mostrar('reserva')">Reservar</button>
  <button class="btn-principal" onclick="mostrar('admin-login')">Administrador</button>
</div>

<!-- PANTALLA RESERVA -->
<div id="reserva" class="pantalla">
  <h2>Nueva Reserva</h2>
  <input type="text" id="nombre" placeholder="Tu nombre"><br>
  <select id="cancha" onchange="mostrarHorarios()">
    <option value="">Elegí cancha</option>
    <option value="1">Cancha 1</option>
    <option value="2">Cancha 2</option>
  </select><br>
  <input type="date" id="fecha" onchange="mostrarHorarios()"><br>
  <div id="horarios"></div>
  <p id="estado"></p>
  <button class="btn-principal" onclick="confirmarReserva()">Confirmar</button>
  <button class="btn-atras" onclick="mostrar('inicio')">Volver</button>
</div>

<!-- PANTALLA ADMIN LOGIN -->
<div id="admin-login" class="pantalla">
  <h2>Acceso Admin</h2>
  <input type="password" id="pass" placeholder="Contraseña"><br>
  <button class="btn-principal" onclick="entrarAdmin()">Entrar</button>
  <button class="btn-atras" onclick="mostrar('inicio')">Volver</button>
</div>

<!-- PANTALLA ADMIN -->
<div id="admin" class="pantalla">
  <h2>Reservas</h2>
  <div id="listaReservas"></div>
  <button class="btn-atras" onclick="mostrar('inicio')">Volver</button>
</div>

<script>
const URL_SHEET = 'https://script.google.com/macros/s/AKfycbwNlKKNR4iSf20c8ZddWCqToXof3HjeJwtGSz6IfslvIcp2EURSaMZiuVIum6cMm3GD0w/exec';
let horaSeleccionada = "";
let reservasCache = [];
const horariosDisponibles = ["13:30","15:00","16:30","18:00","19:30","21:00","22:30"];

function mostrar(pantalla) {
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
  document.getElementById(pantalla).classList.add('activa');
  if(pantalla === 'reservas' || pantalla === 'admin') document.body.classList.add('fondo2');
  else document.body.classList.remove('fondo2');
}

async function cargarReservas() {
  const res = await fetch(URL_SHEET);
  reservasCache = await res.json();
}

async function mostrarHorarios() {
  const cancha = document.getElementById("cancha").value;
  const fecha = document.getElementById("fecha").value;
  const div = document.getElementById("horarios");
  const estado = document.getElementById("estado");
  div.innerHTML = "";
  estado.textContent = "";
  horaSeleccionada = "";
  
  if (!cancha || !fecha) return;
  
  await cargarReservas();
  console.log('Buscando:', cancha, fecha, 'Reservas:', reservasCache);
  const ocupados = reservasCache.filter(r => String(r[1]) == String(cancha) && String(r[2]) == String(fecha)).map(r => String(r[3]).trim());
  
  horariosDisponibles.forEach(h => {
    const btn = document.createElement("button");
    btn.textContent = h;
    btn.className = "hora-btn";
    if(ocupados.includes(h)) {
      btn.classList.add("ocupado");
      btn.disabled = true;
    } else {
      btn.onclick = () => {
        document.querySelectorAll('.hora-btn').forEach(b => b.classList.remove('seleccionado'));
        btn.classList.add('seleccionado');
        horaSeleccionada = h;
        estado.textContent = 'Seleccionaste: ' + h;
      };
    }
    div.appendChild(btn);
  });
}

async function confirmarReserva() {
  const nombre = document.getElementById('nombre').value;
  const cancha = document.getElementById('cancha').value;
  const fecha = document.getElementById('fecha').value;

  
  if(!nombre || !cancha || !fecha || !horaSeleccionada) {
    return alert('Completá todos los datos y elegí un horario');
  }
  
  await fetch(URL_SHEET, {
    method: 'POST',
    body: JSON.stringify({accion: 'guardar', nombre, cancha, fecha, hora: horaSeleccionada})
  });
  
  alert('Reserva confirmada');
  document.getElementById('nombre').value = '';
  document.getElementById('cancha').value = '';
  document.getElementById('fecha').value = '';
  document.getElementById('horarios').innerHTML = '';
  document.getElementById('estado').textContent = '';
  horaSeleccionada = '';
  mostrar('inicio');
}

function entrarAdmin() {
  if(document.getElementById('pass').value === '1234') {
    mostrar('admin');
    verReservas();
  } else alert('Contraseña incorrecta');
}

async function verReservas() {
  await cargarReservas();
  const div = document.getElementById('listaReservas');
  div.innerHTML = '';
  if(reservasCache.length === 0) {
    div.innerHTML = '<p>No hay reservas</p>';
    return;
  }
  reservasCache.forEach((r, i) => {
    div.innerHTML += '<p>' + r[2] + ' ' + r[3] + ' - ' + r[0] + ' (Cancha ' + r[1] + ') <button class="btn-cancelar" onclick="borrarReserva(' + i + ')">Borrar</button></p>';
  });
}

async function borrarReserva(i) {
  await fetch(URL_SHEET, {
    method: 'POST',
    body: JSON.stringify({accion: 'borrar', fila: i})
  });
  verReservas();
}
</script>
</body>
</html>
