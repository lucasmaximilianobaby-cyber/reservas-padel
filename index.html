<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Reservas Padel</title>
<style>
body{font-family:Arial;background:#111;color:#fff;padding:20px;max-width:500px;margin:auto}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:5px;border:none}
button{background:#0f0;color:#000;font-weight:bold;cursor:pointer}
.hora{display:inline-block;padding:8px 12px;margin:4px;background:#333;border-radius:5px;cursor:pointer}
.hora.ocupado{background:#f00;cursor:not-allowed}
.hora.sel{background:#0f0;color:#000}
</style>
</head>
<body>
<h2>Reservas Padel</h2>
<input id="nombre" placeholder="Nombre">
<select id="cancha"><option>Cancha 1</option><option>Cancha 2</option></select>
<input id="fecha" type="date">
<div id="horarios"></div>
<button onclick="confirmar()">Confirmar</button>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbw4dO834_8WFZlTkDYfOgpkozlhUGV8ImpvBL6lLBY23qEd25QhynXyEJJv_ztuSAx1Nw/exec';
let horaSel = '';

document.getElementById('fecha').addEventListener('change', cargar);
document.getElementById('cancha').addEventListener('change', cargar);

function cargar(){
  const fecha = document.getElementById('fecha').value;
  const cancha = document.getElementById('cancha').value;
  if(!fecha) return;
  const f = fecha.split('-').reverse().join('/');
  jsonp(scriptURL + '?action=get&fecha=' + f + '&cancha=' + cancha, mostrar);
}

function mostrar(res){
  const div = document.getElementById('horarios');
  div.innerHTML = '';
  const horarios = ['13:30','15:00','16:30','18:00','19:30','21:00','22:30'];
  horarios.forEach(hora=>{
    const span = document.createElement('span');
    span.className = 'hora' + (res.ocupados.includes(hora)?' ocupado':'');
    span.textContent = hora;
    if(!res.ocupados.includes(hora)) span.onclick = ()=>seleccionar(hora, span);
    div.appendChild(span);
  });
}

function seleccionar(hora, el){
  document.querySelectorAll('.hora').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  horaSel = hora;
}

function confirmar(){
  const nombre = document.getElementById('nombre').value;
  const cancha = document.getElementById('cancha').value;
  const fecha = document.getElementById('fecha').value.split('-').reverse().join('/');
  if(!nombre||!fecha||!horaSel) return alert('Completa todo');
  jsonp(scriptURL + '?action=add&nombre='+nombre+'&cancha='+cancha+'&fecha='+fecha+'&hora='+horaSel, ()=>{
    alert('Reserva confirmada');
    location.reload();
  });
}

function jsonp(url, cb){
  const name = 'cb'+Date.now();
  window[name] = cb;
  const s = document.createElement('script');
  s.src = url + '&callback=' + name;
  document.body.appendChild(s);
}
</script>
</body>
</html>
